[workspace]
resolver = "2"
members = ["main", "http", "grpc", "file"]

[workspace.package]
version      = "0.1.0"
edition      = "2021"
license      = "MIT"
rust-version = "1.75"
authors      = ["SWE Engineering Labs"]
repository   = "https://github.com/sweengineeringlabs/edge"

[workspace.dependencies]
serde            = { version = "1.0", features = ["derive"] }
serde_json       = "1.0"
thiserror        = "2"
async-trait      = "0.1"
futures          = "0.3"
tokio            = { version = "1.0", features = ["rt", "sync", "fs", "io-util", "net"] }
axum             = "0.8"
bytes            = "1"
parking_lot      = "0.12"
walkdir          = "2"
uuid             = { version = "1.0", features = ["v4"] }
chrono           = { version = "0.4", features = ["serde"] }
tracing          = "0.1"
mime_guess       = "2"
base64           = "0.22"
toml             = "0.8"
swe_justobserv_context  = { git = "ssh://git@github.com/sweengineeringlabs/justobserv.git", tag = "v0.2.1" }
swe-observ-processes    = { package = "swe_justobserv_processes", git = "ssh://git@github.com/sweengineeringlabs/justobserv.git", tag = "v0.2.1" }
reqwest          = { version = "0.12", features = ["json"], default-features = false }

# Workspace-internal domain crates
swe-edge-ingress-http  = { path = "http" }
swe-edge-ingress-grpc  = { path = "grpc" }
swe-edge-ingress-file  = { path = "file" }

[workspace.lints.rust]
unsafe_code  = "deny"
missing_docs = "warn"
