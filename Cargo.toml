[workspace]
resolver = "2"
members = [
    "gateway",
    "http/transport",
    "http/verifier",
    "grpc/transport",
    "grpc/reflection",
    "grpc/verifier",
    "tls",
    "verifier",
]

[workspace.package]
version      = "0.1.0"
edition      = "2021"
license      = "MIT"
rust-version = "1.75"
authors      = ["SWE Engineering Labs"]
repository   = "https://github.com/sweengineeringlabs/edge"

[workspace.dependencies]
serde            = { version = "1.0", features = ["derive"] }
serde_json       = "1.0"
thiserror        = "2"
async-trait      = "0.1"
futures          = "0.3"
tokio            = { version = "1.0", features = ["rt", "sync", "fs", "io-util", "net"] }
axum             = "0.8"
bytes            = "1"
tonic            = { version = "0.12", default-features = false, features = ["transport"] }
http-body-util   = "0.1"
parking_lot      = "0.12"
walkdir          = "2"
uuid             = { version = "1.0", features = ["v4"] }
chrono           = { version = "0.4", features = ["serde"] }
tracing          = "0.1"
mime_guess       = "2"
base64           = "0.22"
toml             = "0.8"
swe_justobserv_context  = { git = "ssh://git@github.com/sweengineeringlabs/justobserv.git", tag = "v0.2.1" }
swe-observ-processes    = { package = "swe_justobserv_processes", git = "ssh://git@github.com/sweengineeringlabs/justobserv.git", tag = "v0.2.1" }
reqwest          = { version = "0.12", features = ["json"], default-features = false }

# Workspace-internal domain crates
swe-edge-ingress      = { package = "swe-edge-ingress-gateway",       path = "gateway" }
swe-edge-ingress-http = { package = "swe-edge-ingress-http-transport", path = "http/transport" }
swe-edge-ingress-grpc = { package = "swe-edge-ingress-grpc-transport", path = "grpc/transport" }
swe-edge-ingress-grpc-reflection = { path = "grpc/reflection" }
swe-edge-ingress-tls             = { path = "tls" }
swe-edge-ingress-verifier        = { path = "verifier" }
swe-edge-ingress-http-verifier   = { path = "http/verifier" }
swe-edge-ingress-grpc-verifier   = { path = "grpc/verifier" }

[workspace.lints.rust]
unsafe_code  = "deny"
missing_docs = "warn"
