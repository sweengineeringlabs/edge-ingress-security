[advisories]
vulnerability = "deny"
unmaintained  = "warn"
yanked        = "deny"
notice        = "warn"

[licenses]
unlicensed = "deny"
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Zlib",
]
copyleft = "warn"

[bans]
multiple-versions = "warn"
wildcards         = "allow"

[sources]
unknown-registry  = "warn"
unknown-git       = "warn"
