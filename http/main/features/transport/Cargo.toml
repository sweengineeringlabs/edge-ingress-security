[package]
name         = "swe-edge-ingress-http-transport"
version.workspace     = true
edition.workspace     = true
license.workspace     = true
rust-version.workspace = true
authors.workspace     = true
repository.workspace  = true
description  = "swe-edge ingress — HTTP inbound domain (value objects + HttpIngress port)"
keywords     = ["http", "inbound", "edge", "swe"]
categories   = ["web-programming", "network-programming"]

[package.metadata.struct-engine]
application_type = "lib"
service_type     = "transport"

[lib]
name = "swe_edge_ingress_http"
path = "src/lib.rs"

[[test]]
name    = "axum_stream_int_test"
path    = "tests/axum_stream_int_test.rs"

[[test]]
name    = "axum_server_int_test"
path    = "tests/axum_server_int_test.rs"

[[test]]
name    = "axum_server_tls_int_test"
path    = "tests/axum_server_tls_int_test.rs"

[[test]]
name    = "http_ingress_int_test"
path    = "tests/http_ingress_int_test.rs"

[[test]]
name    = "axum_int_test"
path    = "tests/axum_int_test.rs"

[[test]]
name    = "edge_domain_int_test"
path    = "tests/edge_domain_int_test.rs"

[[test]]
name    = "http_int_test"
path    = "tests/http_int_test.rs"

[[test]]
name    = "hyper_util_int_test"
path    = "tests/hyper_util_int_test.rs"

[[test]]
name    = "swe_edge_ingress_tls_int_test"
path    = "tests/swe_edge_ingress_tls_int_test.rs"

[[test]]
name    = "swe_edge_ingress_verifier_int_test"
path    = "tests/swe_edge_ingress_verifier_int_test.rs"

[[test]]
name    = "swe_observ_metrics_int_test"
path    = "tests/swe_observ_metrics_int_test.rs"

[[test]]
name    = "validator_int_test"
path    = "tests/validator_int_test.rs"

[dependencies]
serde.workspace       = true
serde_json.workspace  = true
thiserror.workspace   = true
async-trait.workspace = true
futures.workspace     = true
tokio.workspace       = true
axum        = { workspace = true, features = ["ws"] }
bytes.workspace       = true
tracing.workspace     = true

swe-edge-ingress-tls.workspace      = true
swe-edge-ingress-verifier.workspace = true
edge-domain.workspace               = true
swe-observ-metrics.workspace        = true
swe_justobserv_context.workspace    = true
matchit      = "0.8"
parking_lot.workspace = true
hyper      = { version = "1", features = ["http1", "http2"] }
hyper-util = { version = "0.1", features = ["tokio", "server", "http1", "http2"] }
http       = "1"

[dev-dependencies]
tokio        = { workspace = true, features = ["rt-multi-thread", "macros"] }
reqwest      = { workspace = true, features = ["json"] }
rcgen        = "0.13"
rustls       = { version = "0.23", features = ["ring"] }
tokio-rustls = "0.26"
tempfile     = "3"
async-trait.workspace  = true
edge-domain.workspace  = true
hyper-util = { version = "0.1", features = ["tokio", "server", "http1", "http2"] }
swe-edge-ingress-tls.workspace      = true
swe-edge-ingress-verifier.workspace = true
swe-observ-metrics.workspace        = true
http       = "1"

[lints]
workspace = true
