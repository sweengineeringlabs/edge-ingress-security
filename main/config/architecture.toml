# SEA project configuration (L0) — swe-edge ingress
[project]
name = "swe-edge-ingress"
workspaces = [
    "grpc",
    "http",
    "message-broker",
    "tls",
    "verifier",
]

[workspace.grpc]
path = "grpc/main/features/*"

[workspace.http]
path = "http/main/features/*"

[workspace."message-broker"]
path = "message-broker/main/features/*"

[workspace.tls]
path = "tls"
kind = "package"

[workspace.verifier]
path = "verifier"
kind = "package"
